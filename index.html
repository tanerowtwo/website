<style>
  /* БАЗОВЫЕ НАСТРОЙКИ И СБРОС СТИЛЕЙ */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html { 
    scroll-behavior: smooth; 
  }

  body { 
    background-color: #09090b; /* zinc-950 */
    color: #f4f4f5; /* zinc-100 */
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    line-height: 1.5;
  }

  ::selection { 
    background: #e4e4e7; /* zinc-200 */
    color: #09090b; 
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  button {
    background: none;
    border: none;
    color: inherit;
    font: inherit;
    cursor: pointer;
  }

  a:focus-visible, button:focus-visible {
    outline: 1px solid #e4e4e7;
    outline-offset: 4px;
  }

  /* ХЕДЕР (HEADER) */
  .site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    border-bottom: 1px solid #18181b; /* zinc-900 */
    background-color: rgba(9, 9, 11, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header-container {
    max-width: 84rem; /* max-w-6xl → шире, чтобы карточки были крупнее */
    margin: 0 auto;
    padding: 0 1.5rem;
    height: 4rem; /* h-16 */
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  @media (min-width: 768px) {
    .header-container { padding: 0 2.5rem; }
  }

  .logo {
    line-height: 1.25;
  }

  .logo-name {
    display: block;
    font-size: 0.875rem; /* text-sm */
    font-weight: 500;
    letter-spacing: -0.025em; /* tracking-tight */
  }

  .logo-title {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em; /* tracking-widest */
    color: #71717a; /* zinc-500 */
  }

  .nav-menu {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.875rem;
    color: #a1a1aa; /* zinc-400 */
  }

  .nav-link {
    position: relative;
    transition: color 0.2s ease;
  }

  .nav-link:hover {
    color: #f4f4f5;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 100%;
    height: 1px;
    background: currentColor;
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.25s ease;
  }

  .nav-link:hover::after {
    transform: scaleX(1);
    transform-origin: left;
  }

  /* СЕКЦИЯ РАБОТ (WORKS) */

    max-width: 84rem;
    margin: 0 auto;
    padding: 6rem 1.5rem 3rem 1.5rem; /* pt-32 pb-20 */
  }

      padding: 7.5rem 2.5rem 4.5rem 2.5rem; /* md:pt-40 md:pb-28 */

  }

  .tabs-container {
    display: flex;
    align-items: center;
    font-size: 0.875rem;
    margin-bottom: 2rem; /* mb-12 */
  }

  .tab-btn {
    padding: 0.5rem 0;
    margin-right: 1.5rem; /* mr-6 */

  .tab-btn.inactive { color: #71717a; }

  /* СЕТКИ ДЛЯ ВИДЕО (GRIDS) */
  .grid-hidden {
    display: none !important;
  }

  /* Горизонтальная сетка (1 колонка на мобилках, 2 на десктопе) */
  .grid-horizontal {
    display: grid;
    grid-template-columns: 1fr;
    column-gap: 1.5rem;
    row-gap: 2rem;
  }

  @media (min-width: 768px) {
    .grid-horizontal {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  /* Вертикальная сетка (1 колонка на мобилках, 4 на десктопе) */
  .grid-vertical {
    display: grid;
    grid-template-columns: 1fr;
    column-gap: 1rem;
    row-gap: 1.75rem;
  }

  @media (min-width: 768px) {
    .grid-vertical {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  /* ФРЕЙМЫ ВИДЕО */

    display: block;
  }

  .video-frame {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: #18181b; /* zinc-900 */
    border-radius: 0.5rem; /* rounded-lg */

  }

    opacity: 0.9;
  }

  .video-frame iframe {

    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .ratio-16-9 {

    width: 100%;
  }
  .ratio-9-16 { 
    position: relative;
    padding-top: 177.78%; /* Это дает идеальные 9:16 под вертикалки */
    width: 100%;
  }

    justify-content: space-between;
    font-size: 0.75rem; /* text-xs */
    color: #71717a; /* zinc-500 */
    letter-spacing: -0.025em; /* tracking-tight */

  .footer-title {

  .contacts-links {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    font-size: 1.125rem; /* text-lg */
  }

  .contacts-links .nav-link {
    color: #d4d4d8; /* zinc-300 */
    display: inline-block;
    width: fit-content;
  }

  .contacts-links .nav-link:hover {
    color: #f4f4f5;
  }

  .footer-bottom {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid #18181b;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: #52525b; /* zinc-600 */
    letter-spacing: -0.025em;
  }

  @media (min-width: 640px) {

      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
  }

  /* АНИМАЦИИ */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  }
</style>

  <script>
    const tabHorizontal = document.getElementById('tab-horizontal');
    const tabVertical = document.getElementById('tab-vertical');
    const gridHorizontal = document.getElementById('grid-horizontal');
    const gridVertical = document.getElementById('grid-vertical');

    const worksSection = document.getElementById('works');

    function showHorizontal() {
      gridHorizontal.classList.remove('grid-hidden');
      gridVertical.classList.add('grid-hidden');

      tabHorizontal.classList.add('active');
      tabHorizontal.classList.remove('inactive');
      tabVertical.classList.add('inactive');
      tabVertical.classList.remove('active');

      tabHorizontal.setAttribute('aria-pressed', 'true');
      tabVertical.setAttribute('aria-pressed', 'false');
      
      // Перезапуск триггера анимаций для появившихся карточек
      checkReveal();
    }

    function showVertical() {
      gridVertical.classList.remove('grid-hidden');
      gridHorizontal.classList.add('grid-hidden');

      tabVertical.classList.add('active');
      tabVertical.classList.remove('inactive');
      tabHorizontal.classList.add('inactive');
      tabHorizontal.classList.remove('active');

      tabVertical.setAttribute('aria-pressed', 'true');
      tabHorizontal.setAttribute('aria-pressed', 'false');
      
      checkReveal();
    }

    tabHorizontal.addEventListener('click', showHorizontal);
    tabVertical.addEventListener('click', showVertical);

    // Появление карточек при скролле
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });

    function checkReveal() {
      document.querySelectorAll('.reveal').forEach((el, i) => {
        if (!el.classList.contains('is-visible')) {
          el.style.transitionDelay = `${(i % 4) * 0.05}s`;
          revealObserver.observe(el);
        }
      });
    }

    // Первая инициализация
    checkReveal();
  </script>
