<style>
  /* БАЗОВЫЕ НАСТРОЙКИ И СБРОС СТИЛЕЙ */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html { 
    scroll-behavior: smooth; 
  }

  body { 
    background-color: #09090b; /* zinc-950 */
    color: #f4f4f5; /* zinc-100 */
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    line-height: 1.5;
  }

  ::selection { 
    background: #e4e4e7; /* zinc-200 */
    color: #09090b; 
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  button {
    background: none;
    border: none;
    color: inherit;
    font: inherit;
    cursor: pointer;
  }

  a:focus-visible, button:focus-visible {
    outline: 1px solid #e4e4e7;
    outline-offset: 4px;
  }

  /* ХЕДЕР (HEADER) */
  .site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background-color: rgba(12, 12, 14, 0.75);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
  }

  .header-container {
    max-width: 84rem; /* max-w-6xl → шире, чтобы карточки были крупнее */
    margin: 0 auto;
    padding: 0 1.5rem;
    height: 4rem; /* h-16 */
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  @media (min-width: 768px) {
    .header-container { padding: 0 2.5rem; }
  }

  .logo {
    line-height: 1.25;
  }

  .logo-name {
    display: block;
    font-size: 0.875rem; /* text-sm */
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .logo-title {
    display: block;
    font-size: 10.5px;
    letter-spacing: 0.12em; /* tracking-widest */
    color: #71717a; /* zinc-500 */
    margin-top: 0.125rem;
  }

  .nav-menu {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.875rem;
    color: #a1a1aa; /* zinc-400 */
    position: relative;
  }

  /* В хедере подчёркивание отдельных ссылок отключаем — вместо него общий индикатор */
  .nav-menu .nav-link::after {
    display: none;
  }

  .nav-indicator {
    position: absolute;
    bottom: -8px;
    left: 0;
    height: 1px;
    width: 0;
    background: #f4f4f5; /* zinc-100 */
    opacity: 0;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.2s ease;
    pointer-events: none;
  }

  .nav-link {
    position: relative;
    transition: color 0.2s ease;
  }

  .nav-link:hover {
    color: #f4f4f5;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 100%;
    height: 1px;
    background: currentColor;
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.25s ease;
  }

  .nav-link:hover::after {
    transform: scaleX(1);
    transform-origin: left;
  }

  /* СЕКЦИЯ РАБОТ (WORKS) */
  .works-section {
    max-width: 84rem;
    margin: 0 auto;
    padding: 5rem 1.5rem 1.5rem 1.5rem; /* pt-32 pb-20 */
  }

  @media (min-width: 768px) {
    .works-section {
      padding: 6rem 2.5rem 2rem 2.5rem; /* md:pt-40 md:pb-28 */
    }
  }

  .tabs-container {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.75rem;
    font-size: 0.875rem;
    margin-bottom: 1.5rem; /* mb-12 */
  }

  .tabs-group {
    position: relative;
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }



  .backup-link {
    color: #71717a;
    white-space: nowrap;
    font-size: 0.8125rem;
  }

  @media (min-width: 640px) {
    .tabs-container {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }
  }

  .tab-btn {
    position: relative;
    z-index: 1;
    padding: 0.5rem 0;
    transition: color 0.3s ease;
  }

  .tab-btn.active { color: #f4f4f5; } /* zinc-100 */
  .tab-btn.inactive { color: #71717a; } /* zinc-500 */
  .tab-btn.inactive:hover { color: #a1a1aa; }

  /* СЕТКИ ДЛЯ ВИДЕО (GRIDS) */
  .grid-hidden {
    display: none !important;
  }

  .grid-horizontal,
  .grid-vertical {
    transition: opacity 0.12s ease;
    opacity: 1;
  }

  .grid-leaving {
    opacity: 0 !important;
  }

  .grid-entering {
    opacity: 0 !important;
  }

  /* Горизонтальная сетка (1 колонка на мобилках, 2 на десктопе) */
  .grid-horizontal {
    display: grid;
    grid-template-columns: 1fr;
    column-gap: 1.25rem;
    row-gap: 1.5rem;
  }

  @media (min-width: 768px) {
    .grid-horizontal {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  /* Вертикальная сетка: 1 колонка на телефонах, 2 на средних экранах, 4 на десктопе */
  .grid-vertical {
    display: grid;
    grid-template-columns: 1fr;
    column-gap: 0.875rem;
    row-gap: 1.25rem;
  }

  @media (min-width: 640px) {
    .grid-vertical {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 1024px) {
    .grid-vertical {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  /* ФРЕЙМЫ ВИДЕО */

    width: 100%;
    overflow: hidden;
    background: #18181b; /* zinc-900 */
    border-radius: 0.5rem; /* rounded-lg */

  }

  /* АНИМАЦИИ */

    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  }
</style>

  <script>
    const tabHorizontal = document.getElementById('tab-horizontal');
    const tabVertical = document.getElementById('tab-vertical');
    const gridHorizontal = document.getElementById('grid-horizontal');
    const gridVertical = document.getElementById('grid-vertical');

    const worksSection = document.getElementById('works');

    let isSwitching = false;

    function switchGrid(showEl, hideEl) {
      if (isSwitching) return;
      isSwitching = true;

      hideEl.classList.add('grid-leaving');

      setTimeout(() => {
        hideEl.classList.add('grid-hidden');
        hideEl.classList.remove('grid-leaving');

        showEl.classList.remove('grid-hidden');
        showEl.classList.add('grid-entering');

        void showEl.offsetWidth; // форсируем перерасчёт стилей

        requestAnimationFrame(() => {
          showEl.classList.remove('grid-entering');
          isSwitching = false;
        });

        checkReveal();
      }, 120);
    }

    function showHorizontal() {
      if (tabHorizontal.classList.contains('active')) return;

      switchGrid(gridHorizontal, gridVertical);

      tabHorizontal.classList.add('active');
      tabHorizontal.classList.remove('inactive');
      tabVertical.classList.add('inactive');
      tabVertical.classList.remove('active');

      tabHorizontal.setAttribute('aria-pressed', 'true');
      tabVertical.setAttribute('aria-pressed', 'false');
    }

    function showVertical() {
      if (tabVertical.classList.contains('active')) return;

      switchGrid(gridVertical, gridHorizontal);

      tabVertical.classList.add('active');
      tabVertical.classList.remove('inactive');
      tabHorizontal.classList.add('inactive');
      tabHorizontal.classList.remove('active');

      tabVertical.setAttribute('aria-pressed', 'true');
      tabHorizontal.setAttribute('aria-pressed', 'false');
    }

    tabHorizontal.addEventListener('click', showHorizontal);
    tabVertical.addEventListener('click', showVertical);

    // Плавающее подчёркивание в хедере — скользит между "Работы" и "Контакты"
    const navMenu = document.querySelector('.nav-menu');
    const navIndicator = document.querySelector('.nav-indicator');
    const navLinks = navMenu.querySelectorAll('.nav-link');

    function moveIndicatorTo(el) {
      const menuRect = navMenu.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      navIndicator.style.left = (elRect.left - menuRect.left) + 'px';
      navIndicator.style.width = elRect.width + 'px';
      navIndicator.style.opacity = '1';
    }

    navLinks.forEach(link => {
      link.addEventListener('mouseenter', () => moveIndicatorTo(link));
    });

    navMenu.addEventListener('mouseleave', () => {
      navIndicator.style.opacity = '0';
    });

    // Плавный скролл по клику на лого/навигацию без изменения URL
    document.querySelectorAll('[data-scroll-target]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('data-scroll-target');
        if (targetId === 'top') {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          const target = document.getElementById(targetId);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    // Появление карточек при скролле
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });

    function checkReveal() {
      document.querySelectorAll('.reveal').forEach((el, i) => {
        if (!el.classList.contains('is-visible')) {
          el.style.transitionDelay = `${(i % 4) * 0.05}s`;
          revealObserver.observe(el);
        }
      });
    }

    // Первая инициализация
    checkReveal();
  </script>
